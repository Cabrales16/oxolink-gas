<style>
  /* ═══════════════════════════════════════════════════════════
   Oxo Partners · Admin · Components Styles  v6
   ═══════════════════════════════════════════════════════════ */

  /* ── KPI Cards ── */
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    box-shadow: var(--shadow-sm);
    transition: all .2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .kpi-card:hover {
    border-color: var(--goldBorder);
    box-shadow: var(--shadow-md);
  }

  .kpi-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .kpi-label {
    font-size: .8rem;
    font-weight: 700;
    color: var(--textMuted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .kpi-icon {
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .kpi-value {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .kpi-sub {
    font-size: .8rem;
    color: var(--textMuted);
  }

  /* ── Badges ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: .73rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .badge-active {
    background: rgba(82, 196, 26, .12);
    color: #389e0d;
  }

  .badge-baja {
    background: rgba(255, 77, 79, .10);
    color: #cf1322;
  }

  .badge-pending {
    background: rgba(255, 166, 5, .12);
    color: #d48806;
  }

  .badge-error {
    background: rgba(255, 77, 79, .10);
    color: #cf1322;
  }

  .badge-sync {
    background: rgba(138, 110, 61, .12);
    color: var(--goldDark);
  }

  /* ── Hotel badges ── */
  .hotel-badge {
    display: inline-block;
    background: var(--goldFaint);
    border: 1px solid var(--goldBorder);
    color: var(--goldDark);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: .73rem;
    font-weight: 600;
    margin-right: 3px;
    white-space: nowrap;
  }

  .hotel-badge-more {
    background: var(--surface2);
    border-color: var(--border);
    color: var(--textMuted);
  }

  /* ── Data table ── */
  .table-wrap {
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    max-height: calc(100vh - var(--topbar-h) - var(--view-pad-y) - 220px);
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .87rem;
  }

  .data-table thead th {
    background: var(--surface2);
    padding: 10px 12px;
    text-align: left;
    font-size: .74rem;
    font-weight: 700;
    color: var(--textMuted);
    text-transform: uppercase;
    letter-spacing: .06em;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
    box-shadow: 0 2px 0 var(--goldBorder);
  }

  .data-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .12s;
    cursor: pointer;
  }

  .data-table tbody tr:last-child {
    border-bottom: 0;
  }

  .data-table tbody tr:hover {
    background: var(--goldFaint);
  }

  .data-table td {
    padding: 10px 12px;
    color: var(--text);
    vertical-align: middle;
  }

  .cell-name {
    font-weight: 600;
  }

  .cell-sub {
    font-size: .76rem;
    color: var(--textMuted);
    margin-top: 1px;
    font-family: 'DM Mono', monospace;
  }

  .cell-mono {
    font-family: 'DM Mono', monospace;
    font-size: .79rem;
    color: var(--textMuted);
  }

  .table-link {
    color: var(--goldDark);
    text-decoration: none;
    font-weight: 500;
  }

  .table-link:hover {
    text-decoration: underline;
  }

  /* ── Row buttons ── */
  .row-btn {
    width: 28px;
    height: 28px;
    border: 0;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    color: var(--textMuted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .12s;
  }

  .row-btn:hover {
    background: var(--goldFaint);
    border-color: var(--goldBorder);
    color: var(--goldDark);
  }

  .row-btn-danger:hover {
    background: rgba(255, 77, 79, .08);
    border-color: rgba(255, 77, 79, .4);
    color: #cf1322;
  }

  /* ── Checkbox in tables ── */
  .table-check {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--gold);
  }

  /* ── Filter bar ── */
  .reg-toolbar {
    margin-bottom: 12px;
  }

  .search-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--borderMid);
    border-radius: var(--radius);
    padding: 0 14px;
    margin-bottom: 10px;
    transition: border-color .18s, box-shadow .18s;
  }

  .search-wrap:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(138, 110, 61, .10);
  }

  .search-wrap i {
    color: var(--textMuted);
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    padding: 11px 0;
    font-family: inherit;
    font-size: .9rem;
    color: var(--text);
    min-width: 0;
  }

  .search-clear {
    border: 0;
    background: transparent;
    color: var(--textMuted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
  }

  .search-clear:hover {
    color: var(--text);
  }

  /* ── Filter buttons ── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-hotels-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-family: inherit;
    font-size: .84rem;
    font-weight: 600;
    color: var(--textMid);
    cursor: pointer;
    transition: background .13s;
    white-space: nowrap;
  }

  .filter-hotels-btn:hover {
    background: var(--goldFaint);
    border-color: var(--goldBorder);
    color: var(--goldDark);
  }

  /* ── Detail sections ── */
  .detail-section {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section:last-child {
    border-bottom: 0;
    margin-bottom: 0;
  }

  .detail-label {
    font-size: .7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--textMuted);
    margin-bottom: 8px;
  }

  .detail-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .88rem;
    color: var(--textMid);
    margin-bottom: 5px;
  }

  .detail-row i {
    color: var(--textMuted);
    flex-shrink: 0;
  }

  .detail-mono {
    font-family: 'DM Mono', monospace;
    font-size: .83rem;
  }

  .detail-hotel {
    background: var(--goldFaint);
    border: 1px solid var(--goldBorder);
    color: var(--goldDark);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    font-size: .82rem;
    font-weight: 600;
    margin-bottom: 5px;
  }

  /* ── Action buttons ── */
  .action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    border-radius: var(--radius-sm);
    padding: 9px 14px;
    font-family: inherit;
    font-size: .87rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .15s;
    background: linear-gradient(135deg, var(--gold), var(--goldDark));
    color: #fff;
    box-shadow: 0 2px 8px rgba(138, 110, 61, .2);
  }

  .action-btn:hover {
    opacity: .9;
    transform: translateY(-1px);
  }

  .drawer-action-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    border: 1px solid var(--goldBorder);
    background: var(--goldFaint);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    color: var(--textMid);
    cursor: pointer;
    transition: all .15s;
  }

  .drawer-action-btn:hover {
    background: var(--goldFaint);
    border-color: var(--goldBorder);
    color: var(--goldDark);
  }

  .btn-baja,
  .btn-activar,
  .btn-eliminar {
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    font-size: .85rem;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: var(--radius-sm);
    transition: all .15s;
  }

  .btn-baja {
    color: #cf1322;
    border-color: rgba(255, 77, 79, .25);
  }

  .btn-baja:hover {
    background: rgba(255, 77, 79, .08);
    border-color: rgba(255, 77, 79, .4);
    color: #cf1322;
  }

  .btn-activar {
    color: #389e0d;
    border-color: rgba(82, 196, 26, .25);
  }

  .btn-activar:hover {
    background: rgba(82, 196, 26, .08);
    border-color: rgba(82, 196, 26, .4);
    color: #389e0d;
  }

  .btn-eliminar {
    color: #cf1322 !important;
    border-color: rgba(207, 19, 34, .25) !important;
  }

  .btn-eliminar:hover {
    background: rgba(207, 19, 34, .08) !important;
    border-color: rgba(207, 19, 34, .4) !important;
    color: #cf1322 !important;
  }

  .bulk-delete {
    background: transparent;
    border: 1px solid rgba(207, 19, 34, .30);
    color: #cf1322;
  }

  .bulk-delete:hover {
    background: rgba(207, 19, 34, .16);
  }

  /* ── Quick action list ── */
  .quick-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .qa-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--gold), var(--goldDark));
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-family: inherit;
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .18s, transform .12s;
    white-space: nowrap;
  }

  .qa-btn:hover {
    opacity: .9;
    transform: translateY(-1px);
  }
</style>
