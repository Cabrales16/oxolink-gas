<style>
  /* ═══════════════════════════════════════════════════════════
   Oxo Partners · Admin · Components Styles  v7
   ═══════════════════════════════════════════════════════════ */

  /* ── KPI Cards ── */
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    box-shadow: var(--shadow-sm);
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }

  .kpi-card:hover {
    box-shadow: var(--shadow-md);
  }

  /* Iconos de KPI - contenedor con background */
  .kpi-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15rem;
  }

  /* Contenido de KPI */
  .kpi-content {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .kpi-value {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }

  .kpi-value-sm {
    font-size: 1rem;
    font-weight: 700;
  }

  .kpi-label {
    font-size: .78rem;
    color: var(--textMuted);
    font-weight: 500;
    line-height: 1.3;
  }

  /* Variantes de KPI */
  .kpi-total::before {
    background: linear-gradient(90deg, var(--gold), var(--goldLight));
  }

  .kpi-total .kpi-icon {
    background: rgba(138, 110, 61, .12);
    color: var(--gold);
  }

  .kpi-active::before {
    background: linear-gradient(90deg, #52c41a, #73d13d);
  }

  .kpi-active .kpi-icon {
    background: rgba(82, 196, 26, .12);
    color: #52c41a;
  }

  .kpi-bajas::before {
    background: linear-gradient(90deg, #ff7875, #ff4d4f);
  }

  .kpi-bajas .kpi-icon {
    background: rgba(255, 77, 79, .10);
    color: #ff4d4f;
  }

  .kpi-time::before {
    background: linear-gradient(90deg, #69b1ff, #1677ff);
  }

  .kpi-time .kpi-icon {
    background: rgba(22, 119, 255, .10);
    color: #1677ff;
  }

  /* ── Badges ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 20px;
    padding: 3px 10px;
    font-size: .73rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .badge-active {
    background: rgba(82, 196, 26, .12);
    color: #389e0d;
  }

  .badge-baja {
    background: rgba(255, 77, 79, .10);
    color: #cf1322;
  }

  .badge-pending {
    background: rgba(255, 166, 5, .12);
    color: #d48806;
  }

  .badge-error {
    background: rgba(255, 77, 79, .10);
    color: #cf1322;
  }

  .badge-sync {
    background: rgba(138, 110, 61, .12);
    color: var(--goldDark);
  }

  /* ── Hotel badges ── */
  .hotel-badge {
    display: inline-block;
    background: var(--goldFaint);
    border: 1px solid var(--goldBorder);
    color: var(--goldDark);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: .73rem;
    font-weight: 600;
    margin-right: 3px;
    white-space: nowrap;
  }

  .hotel-badge-more {
    background: var(--surface2);
    border-color: var(--border);
    color: var(--textMuted);
  }

  /* ── Iconos (espaciados y tamaños consistentes) ── */
  .btn i,
  .action-btn i,
  .qa-btn i,
  .nav-item i,
  .panel-title i {
    flex-shrink: 0;
    margin: 0;
  }

  .nav-item i {
    font-size: 1.05rem;
    width: 20px;
    text-align: center;
  }

  .panel-title i {
    font-size: 1rem;
    color: var(--textMuted);
  }

  /* ── Data table ── */
  .table-wrap {
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    max-height: calc(100vh - var(--topbar-h) - var(--view-pad-y) - 220px);
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .87rem;
  }

  .data-table thead th {
    background: var(--surface2);
    padding: 11px 14px;
    text-align: left;
    font-size: .74rem;
    font-weight: 700;
    color: var(--textMuted);
    text-transform: uppercase;
    letter-spacing: .06em;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 2;
    box-shadow: 0 2px 0 var(--goldBorder);
  }

  .data-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .12s;
    cursor: pointer;
  }

  .data-table tbody tr:last-child {
    border-bottom: 0;
  }

  .data-table tbody tr:hover {
    background: var(--goldFaint);
  }

  .data-table td {
    padding: 11px 14px;
    color: var(--text);
    vertical-align: middle;
  }

  .cell-name {
    font-weight: 600;
  }

  .cell-sub {
    font-size: .76rem;
    color: var(--textMuted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .cell-mono {
    font-family: 'DM Mono', monospace;
    font-size: .79rem;
    color: var(--textMuted);
  }

  .table-link {
    color: var(--goldDark);
    text-decoration: none;
    font-weight: 500;
  }

  .table-link:hover {
    text-decoration: underline;
  }

  /* ── Row buttons ── */
  .row-btn {
    width: 30px;
    height: 30px;
    border: 0;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    color: var(--textMuted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .13s;
  }

  .row-btn:hover {
    background: var(--goldFaint);
    color: var(--goldDark);
  }

  .row-btn-danger:hover {
    background: rgba(255, 77, 79, .08);
    color: #cf1322;
  }

  /* ── Checkbox in tables ── */
  .table-check {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--gold);
  }

  /* ── Table footer & pagination ── */
  .table-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 0;
    flex-wrap: wrap;
    gap: 10px;
  }

  .table-count {
    font-size: .82rem;
    color: var(--textMuted);
  }

  .pagination-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .page-size-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .page-size-label {
    font-size: .8rem;
    color: var(--textMuted);
    white-space: nowrap;
  }

  .page-size-select {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    padding: 5px 8px;
    font-family: inherit;
    font-size: .82rem;
    color: var(--textMid);
    cursor: pointer;
    outline: none;
  }

  .page-size-select:focus {
    border-color: var(--gold);
  }

  .page-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }

  .pag-btn {
    min-width: 32px;
    height: 32px;
    padding: 0 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: .82rem;
    font-weight: 600;
    color: var(--textMid);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all .13s;
  }

  .pag-btn:hover:not(:disabled):not(.active) {
    background: var(--goldFaint);
    border-color: var(--goldBorder);
    color: var(--goldDark);
  }

  .pag-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
  }

  .pag-btn:disabled {
    opacity: .4;
    cursor: not-allowed;
  }

  .pag-dots {
    font-size: .82rem;
    color: var(--textMuted);
    padding: 0 4px;
  }

  /* ── Filter bar ── */
  .reg-toolbar {
    margin-bottom: 14px;
  }

  .search-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--borderMid);
    border-radius: var(--radius);
    padding: 0 14px;
    margin-bottom: 12px;
    transition: border-color .18s, box-shadow .18s;
  }

  .search-wrap:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(138, 110, 61, .10);
  }

  .search-wrap i {
    color: var(--textMuted);
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    padding: 11px 0;
    font-family: inherit;
    font-size: .9rem;
    color: var(--text);
    min-width: 0;
  }

  .search-clear {
    border: 0;
    background: transparent;
    color: var(--textMuted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
  }

  .search-clear:hover {
    color: var(--text);
  }

  /* ── Filter buttons ── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-hotels-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-family: inherit;
    font-size: .84rem;
    font-weight: 600;
    color: var(--textMid);
    cursor: pointer;
    transition: background .13s;
    white-space: nowrap;
  }

  .filter-hotels-btn:hover {
    background: var(--goldFaint);
    border-color: var(--goldBorder);
    color: var(--goldDark);
  }

  /* ── Bulk actions ── */
  .bulk-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fffbe6;
    border: 1px solid #ffe58f;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  .bulk-count {
    font-size: .88rem;
    font-weight: 700;
    color: #d48806;
    white-space: nowrap;
  }

  .bulk-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .bulk-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: 1px solid;
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    font-family: inherit;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .13s;
    white-space: nowrap;
  }

  .bulk-activate {
    background: rgba(82, 196, 26, .10);
    border-color: rgba(82, 196, 26, .30);
    color: #389e0d;
  }

  .bulk-activate:hover {
    background: rgba(82, 196, 26, .20);
  }

  .bulk-deactivate {
    background: rgba(255, 77, 79, .08);
    border-color: rgba(255, 77, 79, .30);
    color: #cf1322;
  }

  .bulk-deactivate:hover {
    background: rgba(255, 77, 79, .16);
  }

  .bulk-deselect {
    background: var(--surface2);
    border-color: var(--border);
    color: var(--textMuted);
  }

  .bulk-deselect:hover {
    background: var(--bg);
  }

  .bulk-export-csv {
    background: rgba(22, 119, 255, .08);
    border-color: rgba(22, 119, 255, .28);
    color: #0958d9;
  }

  .bulk-export-csv:hover {
    background: rgba(22, 119, 255, .16);
  }

  .bulk-delete {
    background: rgba(207, 19, 34, .08);
    border-color: rgba(207, 19, 34, .30);
    color: #cf1322;
  }

  .bulk-delete:hover {
    background: rgba(207, 19, 34, .16);
  }

  /* ── Action buttons (toolbar) ── */
  .action-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    color: var(--textMid);
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }

  .action-btn:hover {
    background: var(--goldFaint);
    border-color: var(--goldBorder);
    color: var(--goldDark);
  }

  /* ── Quick actions (botones gold) ── */
  .quick-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  .qa-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--gold), var(--goldDark));
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-family: inherit;
    font-size: .88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .18s, transform .12s;
    white-space: nowrap;
  }

  .qa-btn:hover {
    opacity: .9;
    transform: translateY(-1px);
  }

  /* ── Drawer action buttons ── */
  .drawer-action-btn {
    flex: 1;
    min-width: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    color: var(--textMid);
    cursor: pointer;
    transition: all .15s;
  }

  .drawer-action-btn:hover {
    background: var(--goldFaint);
    border-color: var(--goldBorder);
    color: var(--goldDark);
  }

  .btn-baja:hover {
    background: rgba(255, 77, 79, .08);
    border-color: rgba(255, 77, 79, .4);
    color: #cf1322;
  }

  .btn-activar:hover {
    background: rgba(82, 196, 26, .08);
    border-color: rgba(82, 196, 26, .4);
    color: #389e0d;
  }

  .btn-eliminar {
    color: #cf1322 !important;
    border-color: rgba(207, 19, 34, .25) !important;
  }

  .btn-eliminar:hover {
    background: rgba(207, 19, 34, .08) !important;
    border-color: rgba(207, 19, 34, .4) !important;
  }

  /* ── Empty states ── */
  .empty-msg {
    color: var(--textMuted);
    font-size: .88rem;
    padding: 20px 16px;
    text-align: center;
  }
</style>
