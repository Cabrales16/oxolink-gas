<style>
  /* ═══════════════════════════════════════════════════════════
   Oxo Partners · Admin · Layout Styles  v6
   ═══════════════════════════════════════════════════════════ */

  /* ══════════════════════════════════════════════════════════
   SHELL — flex row, sidebar empuja contenido
   ══════════════════════════════════════════════════════════ */

  #adminShell {
    display: none;
    height: 100vh;
    overflow: hidden;
    flex-direction: row;
  }

  .sidebar {
    position: relative;
    flex-shrink: 0;
    width: var(--sidebar-collapsed);
    height: 100vh;
    background: linear-gradient(180deg, #1e1b17 0%, #2a2519 100%);
    border-right: 1px solid rgba(255, 255, 255, .05);
    display: flex;
    flex-direction: column;
    z-index: 200;
    overflow: hidden;
    transition: width .22s cubic-bezier(.4, 0, .2, 1);
  }

  .sidebar.is-hover,
  .sidebar.is-open {
    width: var(--sidebar-expanded);
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .45);
    z-index: 199;
    opacity: 0;
    transition: opacity .25s;
  }

  .sidebar-overlay.is-open {
    opacity: 1;
  }

  /* Sidebar brand */
  .sidebar-brand {
    flex-shrink: 0;
    padding: 16px 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(255, 255, 255, .07);
  }

  .sidebar-brand-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--goldDark) 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1rem;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(138, 110, 61, .35);
  }

  .sidebar-brand-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-left: 10px;
    opacity: 0;
    transition: opacity .15s;
    overflow: hidden;
    white-space: nowrap;
  }

  .sidebar.is-hover .sidebar-brand-text,
  .sidebar.is-open .sidebar-brand-text {
    opacity: 1;
  }

  .sidebar-brand-name {
    font-size: .9rem;
    font-weight: 800;
    color: #f0ece3;
    white-space: nowrap;
  }

  .sidebar-brand-sub {
    font-size: .7rem;
    color: rgba(240, 236, 227, .4);
    margin-top: 1px;
    white-space: nowrap;
  }

  /* Sidebar nav */
  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px 6px;
  }

  .nav-section-label {
    font-size: .66rem;
    font-weight: 700;
    color: rgba(240, 236, 227, .3);
    text-transform: uppercase;
    letter-spacing: .1em;
    padding: 0 10px;
    margin-bottom: 6px;
    opacity: 0;
    transition: opacity .15s;
    white-space: nowrap;
    overflow: hidden;
  }

  .sidebar.is-hover .nav-section-label,
  .sidebar.is-open .nav-section-label {
    opacity: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    color: rgba(240, 236, 227, .6);
    cursor: pointer;
    text-decoration: none;
    font-size: .9rem;
    font-weight: 500;
    transition: background .15s, color .15s;
    margin-bottom: 2px;
    border-left: 3px solid transparent;
    white-space: nowrap;
    overflow: hidden;
  }

  .nav-item i {
    font-size: 1.05rem;
    flex-shrink: 0;
  }

  .nav-item span {
    opacity: 0;
    transition: opacity .12s;
  }

  .sidebar.is-hover .nav-item span,
  .sidebar.is-open .nav-item span {
    opacity: 1;
  }

  .nav-item:hover {
    background: rgba(255, 255, 255, .07);
    color: rgba(240, 236, 227, .9);
  }

  .nav-item.active {
    background: linear-gradient(90deg, rgba(138, 110, 61, .35) 0%, rgba(138, 110, 61, .15) 100%);
    color: #f0ece3;
    border-left-color: var(--gold);
  }

  /* Sidebar footer */
  .sidebar-footer {
    padding: 12px 10px;
    border-top: 1px solid rgba(255, 255, 255, .07);
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: .78rem;
    color: rgba(240, 236, 227, .5);
    white-space: nowrap;
    overflow: hidden;
    opacity: 0;
    width: 0;
    pointer-events: none;
    transition: opacity .15s, width .22s cubic-bezier(.4, 0, .2, 1);
  }

  .sidebar.is-hover .sidebar-status,
  .sidebar.is-open .sidebar-status {
    opacity: 1;
    width: auto;
    pointer-events: auto;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-ok {
    background: #52c41a;
    box-shadow: 0 0 5px rgba(82, 196, 26, .5);
  }

  .dot-loading {
    background: var(--gold);
    animation: pulse 1s infinite;
  }

  .dot-error {
    background: #ff4d4f;
  }

  .sidebar-status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
    min-height: 32px;
  }

  .sidebar.is-hover .sidebar-status-row,
  .sidebar.is-open .sidebar-status-row {
    justify-content: space-between;
  }

  .sidebar-refresh-btn,
  .sidebar-logout {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    border: 0;
    background: rgba(255, 255, 255, .05);
    color: rgba(240, 236, 227, .6);
    border-radius: var(--radius-sm);
    padding: 9px 10px;
    font-family: inherit;
    font-size: .9rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
    overflow: hidden;
  }

  .sidebar-refresh-btn {
    justify-content: center;
    gap: 0;
    margin-bottom: 8px;
  }

  .sidebar-refresh-btn i {
    font-size: 1.05rem;
    flex-shrink: 0;
  }

  .sidebar.is-hover .sidebar-refresh-btn,
  .sidebar.is-open .sidebar-refresh-btn {
    width: auto;
    gap: 10px;
  }

  .sidebar-updated {
    font-size: .7rem;
    color: rgba(240, 236, 227, .3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0;
    transition: opacity .15s;
  }

  .sidebar.is-hover .sidebar-updated,
  .sidebar.is-open .sidebar-updated {
    opacity: 1;
  }

  .sidebar-logout:hover,
  .sidebar-refresh-btn:hover {
    background: rgba(255, 255, 255, .10);
    color: rgba(240, 236, 227, .9);
  }

  .sidebar-logout i {
    font-size: 1.05rem;
    flex-shrink: 0;
  }

  .sidebar-logout span {
    opacity: 0;
    transition: opacity .12s;
  }

  .sidebar.is-hover .sidebar-logout span,
  .sidebar.is-open .sidebar-logout span {
    opacity: 1;
  }

  /* ── Topbar: sticky dentro del main-content ── */
  .topbar {
    position: sticky;
    top: 0;
    left: 0;
    right: 0;
    height: var(--topbar-h);
    background: rgba(245, 244, 241, .95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px 0 20px;
    z-index: 100;
  }

  .topbar-menu {
    display: none;
    border: 0;
    background: transparent;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--textMid);
    padding: 6px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }

  .topbar-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Main content ── */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100vh;
    overflow: hidden;
  }

  .view-wrapper {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .view-container {
    padding: var(--view-pad-y) var(--view-pad-x);
    min-height: 100%;
  }

  .view-title {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 22px;
  }

  /* ── Grillas principales ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: var(--kpi-gap);
    margin-bottom: var(--section-gap);
  }

  .kpi-grid-3 {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }

  .kpi-grid-4 {
    grid-template-columns: repeat(4, 1fr);
  }

  .section-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--section-gap);
    margin-bottom: var(--section-gap);
  }

  .section-row.full {
    grid-template-columns: 1fr;
  }

  .col-1 { grid-column: 1; }
  .col-2 { grid-column: 2; }
  .col-span-full { grid-column: 1 / -1; }

  .col-hide-sm { display: block; }
  .col-hide-md { display: block; }
</style>
