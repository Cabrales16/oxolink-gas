<style>
  /* ═══════════════════════════════════════════════════════════
   Oxo Partners · Admin · Form Styles  v6
   ═══════════════════════════════════════════════════════════ */

  /* ══════════════════════════════════════════════════════════
   LOGIN SCREEN
   ══════════════════════════════════════════════════════════ */

  #loginScreen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    overflow: hidden;
  }

  .login-wave-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #f0eeea 0%, #eceae5 50%, #e8e5df 100%);
  }

  .login-wave {
    position: absolute;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .login-wave span {
    position: absolute;
    width: 325vh;
    height: 325vh;
    top: 0;
    left: 50%;
    transform: translate(-50%, -75%);
  }

  .login-wave span:nth-child(1) {
    border-radius: 45%;
    background: rgba(138, 110, 61, 0.18);
    animation: waveAnim 7s linear infinite;
  }

  .login-wave span:nth-child(2) {
    border-radius: 40%;
    background: rgba(109, 86, 48, 0.10);
    animation: waveAnim 12s linear infinite;
  }

  .login-wave span:nth-child(3) {
    border-radius: 42.5%;
    background: rgba(184, 151, 90, 0.07);
    animation: waveAnim 18s linear infinite;
  }

  .login-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .login-card {
    background: rgba(255, 255, 255, .92);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, .95);
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: 0 8px 40px rgba(138, 110, 61, .15), 0 2px 8px rgba(0, 0, 0, .06);
  }

  .login-brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .login-logo {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--goldDark) 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.4rem;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(138, 110, 61, .35);
  }

  .login-brand-name {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--goldDark);
  }

  .login-brand-sub {
    font-size: .78rem;
    color: var(--textMuted);
    margin-top: 2px;
  }

  .login-divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 24px;
  }

  .login-label {
    display: block;
    font-size: .78rem;
    font-weight: 700;
    color: var(--textMuted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 8px;
  }

  .login-input-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--borderMid);
    border-radius: var(--radius);
    padding: 0 14px;
    transition: border-color .18s, box-shadow .18s;
    margin-bottom: 14px;
  }

  .login-input-wrap:focus-within {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(138, 110, 61, .12);
  }

  .login-input-wrap i {
    color: var(--textMuted);
    font-size: 1rem;
    flex-shrink: 0;
  }

  .login-input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    padding: 13px 0;
    font-family: inherit;
    font-size: .95rem;
    color: var(--text);
  }

  .login-input:disabled {
    cursor: not-allowed;
  }

  .login-toggle {
    border: 0;
    background: transparent;
    cursor: pointer;
    color: var(--textMuted);
    padding: 6px;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .login-toggle:disabled {
    cursor: default;
    opacity: .5;
  }

  .login-error {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #fff1f0;
    border: 1px solid #ffccc7;
    color: #cf1322;
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: .87rem;
    margin-top: 12px;
  }

  .login-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    margin-top: 20px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--goldDark) 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 13px;
    font-size: .97rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .18s, transform .14s;
    box-shadow: 0 4px 14px rgba(138, 110, 61, .35);
  }

  .login-btn:hover {
    opacity: .92;
    transform: translateY(-1px);
  }

  .login-btn:disabled {
    opacity: .6;
    cursor: default;
    transform: none;
  }

  .btn-spin {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255, 255, 255, .35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  /* ── Generic form inputs ── */
  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="number"],
  select,
  textarea {
    font-family: inherit;
    font-size: .9rem;
    color: var(--text);
  }

  input[type="checkbox"],
  input[type="radio"] {
    cursor: pointer;
    accent-color: var(--gold);
  }
</style>
